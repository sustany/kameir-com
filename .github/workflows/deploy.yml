name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force full deploy (ignore manifest diff)'
        required: false
        default: 'false'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via cPanel API
        env:
          CPANEL_HOST: 15.204.206.156
          CPANEL_USER: greendat
          CPANEL_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          DEPLOY_DIR: public_html/kameir.com
          FORCE_FULL: ${{ github.event.inputs.force_full || 'false' }}
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, urllib.parse, json, ssl, sys, mimetypes, uuid, time, threading, hashlib
          from pathlib import Path
          from concurrent.futures import ThreadPoolExecutor, as_completed

          HOST       = os.environ['CPANEL_HOST']
          USER       = os.environ['CPANEL_USER']
          TOKEN      = os.environ.get('CPANEL_TOKEN', '')
          DDIR       = os.environ['DEPLOY_DIR']
          FORCE_FULL = os.environ.get('FORCE_FULL', 'false').lower() == 'true'

          if not TOKEN:
              print("ERROR: CPANEL_API_TOKEN secret is empty or not set", flush=True)
              sys.exit(1)

          print(f"Token length={len(TOKEN)}, host={HOST}, user={USER}", flush=True)

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          BASE    = f"https://{HOST}:2083/execute"
          AUTH    = f"cpanel {USER}:{TOKEN}"
          HEADERS = {"Authorization": AUTH, "Content-Type": "application/x-www-form-urlencoded"}

          _lock = threading.Lock()
          def log(msg):
              with _lock:
                  print(msg, flush=True)

          def uapi(endpoint, params):
              data = urllib.parse.urlencode(params).encode()
              req  = urllib.request.Request(f"{BASE}/{endpoint}", data=data, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                      return json.load(r)
              except Exception as e:
                  return {"status": 0, "errors": [str(e)]}

          def mkdir_p(remote_path):
              """Create a directory, ensuring parents exist first."""
              parts = remote_path.rsplit("/", 1)
              parent = parts[0] if len(parts) == 2 else ""
              name   = parts[-1]
              params = urllib.parse.urlencode({
                  "cpanel_jsonapi_version": "2",
                  "cpanel_jsonapi_module": "Fileman",
                  "cpanel_jsonapi_func": "createdir",
                  "dir": parent,
                  "newdirname": name,
              }).encode()
              req = urllib.request.Request(
                  f"https://{HOST}:2083/json-api/cpanel",
                  data=params,
                  headers=HEADERS,
              )
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                      res = json.load(r)
                  data = res.get("cpanelresult", {}).get("data", [{}])
                  ok = data[0].get("result", 0) if data else 0
                  reason = data[0].get("reason", "") if data else ""
                  return ok or "exist" in reason.lower()
              except Exception as e:
                  log(f"  mkdir error {remote_path!r}: {e}")
                  return False

          def upload_file(fp, rem_dir, retries=3):
              raw = fp.read_bytes()
              try:
                  content   = raw.decode("utf-8")
                  is_binary = False
              except UnicodeDecodeError:
                  is_binary = True

              if not is_binary:
                  for attempt in range(1, retries + 1):
                      res = uapi("Fileman/save_file_content", {
                          "dir":          rem_dir,
                          "file":         fp.name,
                          "content":      content,
                          "from_charset": "UTF-8",
                          "to_charset":   "UTF-8",
                      })
                      if res.get("status") == 1:
                          return True
                      if attempt < retries:
                          time.sleep(2 * attempt)
                  log(f"  FAIL {fp.name} => {json.dumps(res)}")
                  return False
              else:
                  for attempt in range(1, retries + 1):
                      boundary = uuid.uuid4().hex.encode()
                      mime = mimetypes.guess_type(fp.name)[0] or "application/octet-stream"
                      body = (
                          b"--" + boundary + b"\r\n"
                          b'Content-Disposition: form-data; name="dir"\r\n\r\n' +
                          rem_dir.encode() + b"\r\n"
                          b"--" + boundary + b"\r\n"
                          b'Content-Disposition: form-data; name="overwrite"\r\n\r\n'
                          b"1\r\n"
                          b"--" + boundary + b"\r\n"
                          b'Content-Disposition: form-data; name="file-1"; filename="' +
                          fp.name.encode() + b'"\r\n'
                          b"Content-Type: " + mime.encode() + b"\r\n\r\n" +
                          raw + b"\r\n"
                          b"--" + boundary + b"--\r\n"
                      )
                      req = urllib.request.Request(
                          f"https://{HOST}:2083/execute/Fileman/upload_files",
                          data=body,
                          headers={
                              "Authorization": AUTH,
                              "Content-Type": f"multipart/form-data; boundary={boundary.decode()}",
                          },
                          method="POST",
                      )
                      try:
                          with urllib.request.urlopen(req, context=ctx, timeout=60) as r:
                              res = json.load(r)
                          if res.get("status") == 1:
                              return True
                          if attempt < retries:
                              time.sleep(2 * attempt)
                      except Exception as e:
                          if attempt < retries:
                              time.sleep(2 * attempt)
                          else:
                              log(f"  FAIL {fp.name} (binary): {e}")
                              return False
                  log(f"  FAIL {fp.name} (binary) => {json.dumps(res)}")
                  return False

          def deploy_file(item):
              fp, rem_dir = item
              rel = fp.relative_to(dist)
              ok = upload_file(fp, rem_dir)
              if ok:
                  log(f"  ok {rel}")
              return ok

          # ── Build manifest of current dist ──────────────────────────
          dist      = Path("dist")
          all_files = sorted(f for f in dist.rglob("*") if f.is_file())

          def sha256_short(fp):
              return hashlib.sha256(fp.read_bytes()).hexdigest()[:20]

          new_manifest = {str(fp.relative_to(dist)): sha256_short(fp) for fp in all_files}

          # ── Fetch deployed manifest (best-effort) ────────────────────
          old_manifest = {}
          if not FORCE_FULL:
              try:
                  mctx = ssl.create_default_context()
                  mctx.check_hostname = False
                  mctx.verify_mode    = ssl.CERT_NONE
                  with urllib.request.urlopen("https://kameir.com/manifest.json",
                                              context=mctx, timeout=10) as r:
                      old_manifest = json.load(r)
                  print(f"Fetched deployed manifest ({len(old_manifest)} entries)", flush=True)
              except Exception as e:
                  print(f"No deployed manifest found ({e}), doing full deploy", flush=True)

          # Always upload manifest.json itself (exclude from diff, upload last)
          MANIFEST_KEY = "manifest.json"
          files_to_upload = [
              fp for fp in all_files
 