name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Push to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: deploy
          publish_dir: ./dist
          force_orphan: true

      - name: Pull latest on cPanel then deploy
        run: |
          BASE="https://${{ secrets.SFTP_HOST }}:2083/execute"
          AUTH="Authorization: cpanel greendat:${{ secrets.CPANEL_API_TOKEN }}"
          REPO="repository_root=/home/greendat/repositories/kameir-com"
          curl -sk -o /dev/null -w "pull: %{http_code}\n" -H "$AUTH" --data-urlencode "$REPO" "$BASE/VersionControl/update"
          curl -sk -o /dev/null -w "deploy: %{http_code}\n" -H "$AUTH" --data-urlencode "$REPO" "$BASE/VersionControlDeployment/create"