name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via cPanel API
        env:
          CPANEL_HOST: 15.204.206.156
          CPANEL_USER: greendat
          CPANEL_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          DEPLOY_DIR: public_html/kameir.com
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, urllib.parse, json, ssl, sys
          from pathlib import Path

          HOST  = os.environ['CPANEL_HOST']
          USER  = os.environ['CPANEL_USER']
          TOKEN = os.environ.get('CPANEL_TOKEN', '')
          DDIR  = os.environ['DEPLOY_DIR']

          if not TOKEN:
              print("ERROR: CPANEL_API_TOKEN secret is empty or not set", flush=True)
              sys.exit(1)

          print(f"Token length={len(TOKEN)}, host={HOST}, user={USER}", flush=True)

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          BASE    = f"https://{HOST}:2083"
          HEADERS = {"Authorization": f"cpanel {USER}:{TOKEN}",
                     "Content-Type": "application/x-www-form-urlencoded"}

          def uapi(endpoint, params):
              """cPanel UAPI call."""
              data = urllib.parse.urlencode(params).encode()
              req  = urllib.request.Request(
                  f"{BASE}/execute/{endpoint}", data=data, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                      return json.load(r)
              except Exception as e:
                  return {"status": 0, "errors": [str(e)]}

          def api2_mkdir(full_rel_path):
              """
              cPanel API2 Fileman/createdir.
              full_rel_path: full path of the new directory, relative to home.
              e.g. 'public_html/kameir.com/ai-ethics'
              """
              qs = urllib.parse.urlencode({
                  "cpanel_jsonapi_user":       USER,
                  "cpanel_jsonapi_apiversion": "2",
                  "cpanel_jsonapi_module":     "Fileman",
                  "cpanel_jsonapi_func":       "createdir",
                  "path":                      full_rel_path,
              })
              req = urllib.request.Request(
                  f"{BASE}/json-api/cpanel?{qs}", headers=HEADERS)
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                      return json.load(r)
              except Exception as e:
                  return {"cpanelresult": {"event": {"result": 0}, "errors": [str(e)]}}

          dist      = Path("dist")
          all_files = [f for f in dist.rglob("*") if f.is_file()]
          print(f"Deploying {len(all_files)} files to {DDIR}", flush=True)

          # Step 1: pre-create all required subdirectories via cPanel API2
          all_subdirs = set()
          for fp in all_files:
              rel = fp.relative_to(dist)
              if str(rel.parent) != ".":
                  parts = Path(rel.parent).parts
                  for i in range(len(parts)):
                      all_subdirs.add("/".join(parts[: i + 1]))

          for subpath in sorted(all_subdirs):
              full_path = f"{DDIR}/{subpath}"
              r         = api2_mkdir(full_path)
              result    = r.get("cpanelresult", {}).get("event", {}).get("result", 0)
              reason    = r.get("cpanelresult", {}).get("reason", r)
              if result == 1:
                  print(f"  mkdir {subpath}: created", flush=True)
              else:
                  print(f"  mkdir {subpath}: {reason} (may already exist)", flush=True)

          # Step 2: upload all files
          failures = 0
          for fp in sorted(all_files):
              rel     = fp.relative_to(dist)
              rem_dir = f"{DDIR}/{rel.parent}" if str(rel.parent) != "." else DDIR

              raw = fp.read_bytes()
              try:
                  content      = raw.decode("utf-8")
                  from_charset = "UTF-8"
              except UnicodeDecodeError:
                  print(f"  ~ {rel} (binary, skipped)", flush=True)
                  continue

              res = uapi("Fileman/save_file_content", {
                  "dir":          rem_dir,
                  "file":         fp.name,
                  "content":      content,
                  "from_charset": from_charset,
                  "to_charset":   "UTF-8",
              })
              if res.get("status") == 1:
                  print(f"  ok {rel}", flush=True)
              else:
                  failures += 1
                  print(f"  FAIL {rel} => {res.get('errors', res.get('raw', res))}", flush=True)

          if failures:
              print(f"\n{failures} file(s) failed.", flush=True)
              sys.exit(1)
          print(f"\nDeploy complete: {len(all_files)} files.", flush=True)
          PYEOF

      - name: Verify deployment
        run: |
          sleep 3
          echo "=== homepage check ==="
          curl -sk https://kameir.com/ | grep -o 'Christian Kameir' | head -1 || echo "MISSING"
          echo "=== ai-ethics check ==="
          curl -sk https://kameir.com/ai-ethics | grep -o 'Ethics Safe AI Use' | head -1 || echo "MISSING"
