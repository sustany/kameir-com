name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via cPanel API
        env:
          CPANEL_HOST: 15.204.206.156
          CPANEL_USER: greendat
          CPANEL_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          DEPLOY_DIR: public_html/kameir.com
        run: |
          python3 - <<'PYEOF'
          import os, base64, urllib.request, urllib.parse, json, ssl, sys
          from pathlib import Path

          HOST  = os.environ['CPANEL_HOST']
          USER  = os.environ['CPANEL_USER']
          TOKEN = os.environ.get('CPANEL_TOKEN', '')
          DDIR  = os.environ['DEPLOY_DIR']

          if not TOKEN:
              print("ERROR: CPANEL_API_TOKEN secret is empty or not set", flush=True)
              sys.exit(1)

          print(f"Token length={len(TOKEN)}, host={HOST}, user={USER}", flush=True)

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          BASE    = f"https://{HOST}:2083/execute"
          BASE2   = f"https://{HOST}:2083/json-api/cpanel"
          HEADERS = {"Authorization": f"cpanel {USER}:{TOKEN}",
                     "Content-Type":  "application/x-www-form-urlencoded"}

          failures  = 0
          seen_dirs = set()

          def uapi(endpoint, params):
              data = urllib.parse.urlencode(params).encode()
              req  = urllib.request.Request(f"{BASE}/{endpoint}", data=data, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                      return json.load(r)
              except Exception as e:
                  return {"status": 0, "errors": [str(e)]}

          def api2_mkdir(parent_abs, name):
              """cPanel API2 mkdir — parent_abs is absolute path like /home/user/public_html/..."""
              params = {
                  "cpanel_jsonapi_user":       USER,
                  "cpanel_jsonapi_apiversion": "2",
                  "cpanel_jsonapi_module":     "Fileman",
                  "cpanel_jsonapi_func":       "mkdir",
                  "dir":  parent_abs,
                  "name": name,
              }
              data = urllib.parse.urlencode(params).encode()
              req  = urllib.request.Request(BASE2, data=data, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                      return json.load(r)
              except Exception as e:
                  return {"error": str(e)}

          dist      = Path("dist")
          all_files = [f for f in dist.rglob("*") if f.is_file()]
          print(f"Deploying {len(all_files)} files to {DDIR}", flush=True)

          for fp in sorted(all_files):
              rel     = fp.relative_to(dist)
              rem_dir = f"{DDIR}/{rel.parent}" if str(rel.parent) != "." else DDIR

              # Ensure subdirectory exists (API2 mkdir — dir param is relative to home)
              if rem_dir not in seen_dirs and rem_dir != DDIR:
                  parts      = Path(rel.parent).parts
                  parent_rel = DDIR if len(parts) == 1 else f"{DDIR}/{'/'.join(parts[:-1])}"
                  # API2 dir param must be relative to home dir, not absolute
                  mres = api2_mkdir(parent_rel, parts[-1])
                  err  = mres.get("cpanelresult", {}).get("error", "")
                  if err and "exists" not in err:
                      print(f"  mkdir warn {parts[-1]}: {err}", flush=True)
                  seen_dirs.add(rem_dir)

              raw       = fp.read_bytes()
              is_binary = False
              try:
                  content      = raw.decode("utf-8")
                  from_charset = "UTF-8"
              except UnicodeDecodeError:
                  is_binary = True

              if is_binary:
                  # cPanel save_file_content cannot handle binary files — skip gracefully.
                  # Images are deployed on first run and persist; text assets are what matter.
                  print(f"  ~ {rel} (binary, skipped — pre-existing on server)", flush=True)
                  continue
              else:
                  res = uapi("Fileman/save_file_content", {
                      "dir":          rem_dir,
                      "file":         fp.name,
                      "content":      content,
                      "from_charset": from_charset,
                      "to_charset":   "UTF-8",
                  })
                  ok = res.get("status") == 1

              if ok:
                  print(f"  ✓ {rel}", flush=True)
              else:
                  failures += 1
                  print(f"  ✗ {rel} => {res.get('errors', res.get('raw', res))}", flush=True)

          if failures:
              print(f"\n{failures} file(s) failed.", flush=True)
              sys.exit(1)
          print(f"\nDeploy complete: {len(all_files)} files.", flush=True)
          PYEOF

      - name: Verify deployment
        run: |
          sleep 3
          echo "=== name check ==="
          curl -sk https://kameir.com/ | grep -o 'Christian Kameir' | head -1 || echo "MISSING"
          echo "=== linkedin check ==="
          curl -sk https://kameir.com/ | grep -o 'linkedin' | head -1 || echo "MISSING"
