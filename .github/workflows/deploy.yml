name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via cPanel API
        env:
          CPANEL_HOST: 15.204.206.156
          CPANEL_USER: greendat
          CPANEL_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          DEPLOY_DIR: public_html/kameir.com
        run: |
          python3 - <<'PYEOF'
          import os, base64, urllib.request, urllib.parse, json, ssl, sys

          HOST  = os.environ['CPANEL_HOST']
          USER  = os.environ['CPANEL_USER']
          TOKEN = os.environ.get('CPANEL_TOKEN', '')
          DDIR  = os.environ['DEPLOY_DIR']

          if not TOKEN:
              print("ERROR: CPANEL_API_TOKEN secret is empty or not set", flush=True)
              sys.exit(1)

          print(f"Token set (length={len(TOKEN)}), host={HOST}, user={USER}", flush=True)

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          BASE = f"https://{HOST}:2083/execute"
          HEADERS = {
              "Authorization": f"cpanel {USER}:{TOKEN}",
              "Content-Type":  "application/x-www-form-urlencoded",
          }

          failures = 0

          def api(endpoint, params):
              data = urllib.parse.urlencode(params).encode()
              req  = urllib.request.Request(f"{BASE}/{endpoint}", data=data, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                      return json.load(r)
              except Exception as e:
                  return {"status": 0, "errors": [str(e)]}

          from pathlib import Path
          dist = Path("dist")

          all_files = [f for f in dist.rglob("*") if f.is_file()]
          print(f"Deploying {len(all_files)} files to {DDIR}", flush=True)

          for fp in sorted(all_files):
              rel     = fp.relative_to(dist)
              rem_dir = f"{DDIR}/{rel.parent}" if str(rel.parent) != "." else DDIR

              raw = fp.read_bytes()
              try:
                  content      = raw.decode("utf-8")
                  from_charset = "UTF-8"
              except UnicodeDecodeError:
                  content      = base64.b64encode(raw).decode("ascii")
                  from_charset = "base64"

              # cPanel UAPI: dir = directory, file = filename only
              res = api("Fileman/save_file_content", {
                  "dir":          rem_dir,
                  "file":         fp.name,
                  "content":      content,
                  "from_charset": from_charset,
                  "to_charset":   "UTF-8",
              })

              if res.get("status") == 1:
                  print(f"  ✓ {rel}", flush=True)
              else:
                  failures += 1
                  print(f"  ✗ {rel} => {res.get('errors', res)}", flush=True)

          if failures:
              print(f"\n{failures} file(s) failed to upload.", flush=True)
              sys.exit(1)
          print(f"\nDeploy complete: {len(all_files)} files uploaded.", flush=True)
          PYEOF

      - name: Verify deployment
        run: |
          echo "Fetching live site to verify..."
          sleep 3
          curl -sk https://kameir.com/ | grep -o 'Christian Kameir' | head -1 || echo "Name not found in live HTML"
          curl -sk https://kameir.com/ | grep -o 'linkedin' | head -1 || echo "LinkedIn not found in live HTML"
