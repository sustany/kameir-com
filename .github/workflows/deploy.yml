name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push the deploy branch
    timeout-minutes: 15

    steps:
      # -- 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # -- 2. Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # -- 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # -- 4. Build
      - name: Build
        run: npm run build

      # -- 5. Push dist/ to deploy branch
      # .cpanel.yml (from public/) tells cPanel to sync files to
      # /home/greendat/public_html/kameir.com after each pull.
      - name: Push to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: deploy
          publish_dir: ./dist
          force_orphan: true

      # -- 6. Trigger cPanel Git pull + deploy
      # Uses cPanel API token (no password special-char issues).
      - name: Trigger cPanel deployment
        run: |
          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
            -H "Authorization: cpanel greendat:${{ secrets.CPANEL_API_TOKEN }}" \
            --data-urlencode "repository_root=/home/greendat/repositories/kameir-com" \
            "https://${{ secrets.SFTP_HOST }}:2083/execute/VersionControlDeployment/create")
          echo "cPanel API response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Warning: cPanel deployment trigger returned $HTTP_STATUS"
          fi
