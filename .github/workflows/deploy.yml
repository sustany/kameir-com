name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
        run: |
          # Write credentials to netrc so special chars in password don't break lftp parsing
          python3 -c "
import os, stat
netrc = os.path.expanduser('~/.netrc')
with open(netrc, 'w') as f:
    f.write('machine {}\nlogin {}\npassword {}\n'.format(
        os.environ['SFTP_HOST'], os.environ['SFTP_USER'], os.environ['SFTP_PASS']))
os.chmod(netrc, stat.S_IRUSR | stat.S_IWUSR)
"
          lftp -c "
          set ftp:ssl-allow yes;
          set ftp:ssl-force no;
          set net:timeout 30;
          set net:max-retries 3;
          open $SFTP_HOST;
          mirror --reverse --verbose --delete ./dist/ public_html/kameir.com/;
          bye;
          "
