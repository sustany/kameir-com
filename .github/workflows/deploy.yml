name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual runs from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node setup ──────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build ───────────────────────────────────────────────
      - name: Build
        run: npm run build
        # dist/ is the output directory (Astro default)

      # ── 5. Deploy via SCP (SSH) ────────────────────────────────
      # Secrets required in GitHub → Settings → Secrets → Actions:
      #   SFTP_HOST  — 15.204.206.156
      #   SFTP_USER  — cPanel SSH username (greendat)
      #   SFTP_PASS  — cPanel password
      # Target path is relative to SSH home (/home/greendat/)
      - name: Deploy to ChemiCloud
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          source: "dist/"
          target: "public_html/kameir.com"
          strip_components: 1
          rm: false
