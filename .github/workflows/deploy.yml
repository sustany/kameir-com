name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo "=== index.html preview ==="
          head -30 dist/index.html

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -c "
          set ftp:ssl-allow yes;
          set ftp:ssl-force no;
          set net:timeout 30;
          set net:max-retries 3;
          open ftp://${{ secrets.SFTP_USER }}:${{ secrets.SFTP_PASS }}@${{ secrets.SFTP_HOST }};
          mirror --reverse --verbose --delete ./dist/ public_html/kameir.com/;
          bye;
          "
