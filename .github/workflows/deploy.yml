name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual runs from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node setup ──────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build ───────────────────────────────────────────────
      - name: Build
        run: npm run build
        # dist/ is the output directory (Astro default)

      # ── 5. Deploy via FTP ──────────────────────────────────────
      # Secrets required in GitHub → Settings → Secrets → Actions:
      #   SFTP_HOST  — 15.204.206.156
      #   SFTP_USER  — cPanel username (ChemiCloud)
      #   SFTP_PASS  — cPanel password
      #   FTP_PATH   — public_html/kameir.com/ (relative to FTP root, trailing slash required)
      - name: Deploy to ChemiCloud
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          local-dir: dist/
          server-dir: ${{ secrets.FTP_PATH }}
          protocol: ftps
          port: 21
