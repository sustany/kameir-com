name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force full deploy (ignore manifest)'
        required: false
        type: string
        default: 'false'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via cPanel API
        env:
          CPANEL_HOST: 15.204.206.156
          CPANEL_USER: greendat
          CPANEL_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          DEPLOY_DIR: public_html/kameir.com
          FORCE_FULL: ${{ github.event.inputs.force_full || 'false' }}
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, urllib.parse, json, ssl, sys
          import uuid, time, hashlib, zipfile, random, string
          from pathlib import Path

          HOST       = os.environ['CPANEL_HOST']
          USER       = os.environ['CPANEL_USER']
          TOKEN      = os.environ.get('CPANEL_TOKEN', '')
          DDIR       = os.environ['DEPLOY_DIR']
          FORCE_FULL = os.environ.get('FORCE_FULL', 'false').lower() == 'true'

          if not TOKEN:
              print("ERROR: CPANEL_API_TOKEN not set", flush=True)
              sys.exit(1)

          print(f"host={HOST} user={USER} force_full={FORCE_FULL}", flush=True)

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          BASE    = f"https://{HOST}:2083/execute"
          AUTH    = f"cpanel {USER}:{TOKEN}"
          HEADERS = {"Authorization": AUTH, "Content-Type": "application/x-www-form-urlencoded"}

          def uapi(endpoint, params):
              data = urllib.parse.urlencode(params).encode()
              req  = urllib.request.Request(f"{BASE}/{endpoint}", data=data, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=60) as r:
                      return json.load(r)
              except Exception as e:
                  return {"status": 0, "errors": [str(e)]}

          def upload_zip(zip_path, rem_dir, retries=3):
              # Upload a ZIP file via cPanel multipart upload
              for attempt in range(1, retries + 1):
                  boundary = uuid.uuid4().hex.encode()
                  raw = zip_path.read_bytes()
                  body = (
                      b"--" + boundary + b"\r\n"
                      b'Content-Disposition: form-data; name="dir"\r\n\r\n' +
                      rem_dir.encode() + b"\r\n--" + boundary + b"\r\n"
                      b'Content-Disposition: form-data; name="overwrite"\r\n\r\n1\r\n'
                      b"--" + boundary + b"\r\n"
                      b'Content-Disposition: form-data; name="file-1"; filename="deploy.zip"\r\n'
                      b"Content-Type: application/zip\r\n\r\n" +
                      raw + b"\r\n--" + boundary + b"--\r\n"
                  )
                  req = urllib.request.Request(
                      f"https://{HOST}:2083/execute/Fileman/upload_files",
                      data=body,
                      headers={"Authorization": AUTH,
                               "Content-Type": f"multipart/form-data; boundary={boundary.decode()}"},
                      method="POST",
                  )
                  try:
                      with urllib.request.urlopen(req, context=ctx, timeout=300) as r:
                          res = json.load(r)
                      if res.get("status") == 1:
                          return True
                      print(f"  upload attempt {attempt} failed: {res.get('errors', res)}", flush=True)
                  except Exception as e:
                      print(f"  upload attempt {attempt} error: {e}", flush=True)
                  if attempt < retries:
                      time.sleep(5)
              return False

          def upload_text(fp, rem_dir, retries=3):
              # Upload a single text file
              content = fp.read_text(encoding="utf-8")
              for attempt in range(1, retries + 1):
                  res = uapi("Fileman/save_file_content", {
                      "dir": rem_dir, "file": fp.name,
                      "content": content,
                      "from_charset": "UTF-8", "to_charset": "UTF-8",
                  })
                  if res.get("status") == 1:
                      return True
                  if attempt < retries:
                      time.sleep(2 * attempt)
              print(f"  FAIL {fp.name}: {json.dumps(res)}", flush=True)
              return False

          def upload_text_str(filename, content, rem_dir, retries=3):
              # Upload a text string as a file
              for attempt in range(1, retries + 1):
                  res = uapi("Fileman/save_file_content", {
                      "dir": rem_dir, "file": filename,
                      "content": content,
                      "from_charset": "UTF-8", "to_charset": "UTF-8",
                  })
                  if res.get("status") == 1:
                      return True
                  if attempt < retries:
                      time.sleep(2 * attempt)
              print(f"  FAIL {filename}: {json.dumps(res)}", flush=True)
              return False

          # Build manifest of current dist
          dist      = Path("dist")
          all_files = sorted(f for f in dist.rglob("*") if f.is_file())

          def sha_short(fp):
              return hashlib.sha256(fp.read_bytes()).hexdigest()[:20]

          new_manifest = {str(fp.relative_to(dist)): sha_short(fp) for fp in all_files}

          # Fetch deployed manifest (best-effort)
          MKEY = "manifest.json"
          old_manifest = {}
          if not FORCE_FULL:
              try:
                  mctx = ssl.create_default_context()
                  mctx.check_hostname = False
                  mctx.verify_mode    = ssl.CERT_NONE
                  with urllib.request.urlopen(
                      "https://kameir.com/manifest.json",
                      context=mctx, timeout=10
                  ) as r:
                      old_manifest = json.load(r)
                  print(f"Manifest: {len(old_manifest)} deployed entries", flush=True)
              except Exception as e:
                  print(f"No manifest on server ({e}), full deploy", flush=True)

          # Determine which files changed
          to_deploy = [
              fp for fp in all_files
              if str(fp.relative_to(dist)) != MKEY
              and new_manifest.get(str(fp.relative_to(dist)))
                  != old_manifest.get(str(fp.relative_to(dist)))
          ]
          print(f"Changed: {len(to_deploy)}/{len(all_files)} files", flush=True)

          failures = 0

          if to_deploy:
              # Pack changed files into a single ZIP
              zip_path = Path("/tmp/deploy.zip")
              with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED, compresslevel=6) as zf:
                  for fp in to_deploy:
                      zf.write(fp, str(fp.relative_to(dist)))
              zip_mb = zip_path.stat().st_size / 1_048_576
              print(f"ZIP: {zip_mb:.1f} MB ({len(to_deploy)} files)", flush=True)

              # Upload ZIP
              print("Uploading ZIP...", flush=True)
              if not upload_zip(zip_path, DDIR):
                  print("ZIP upload FAILED after retries", flush=True)
                  failures += 1
              else:
                  print("ZIP uploaded — running PHP extractor...", flush=True)

                  # Generate a hard-to-guess extractor filename
                  token = ''.join(random.choices('abcdef0123456789', k=12))
                  EXTRACTOR = f"_extract_{token}.php"

                  # PHP script: extracts deploy.zip then self-deletes
                  php = (
                      "<?php "
                      "$d=__DIR__;"
                      "$z=new ZipArchive;"
                      "$r=$z->open($d.'/deploy.zip');"
                      "if($r===true){"
                      "$z->extractTo($d);"
                      "$z->close();"
                      "unlink($d.'/deploy.zip');"
                      "unlink(__FILE__);"
                      "echo 'OK';"
                      "}else{"
                      "http_response_code(500);"
                      "echo 'FAIL:'.$r;"
                      "}"
                      "?>"
                  )

                  # Upload the PHP extractor
                  if not upload_text_str(EXTRACTOR, php, DDIR):
                      print("PHP extractor upload FAILED", flush=True)
                      failures += 1
                      # Clean up ZIP since we can't extract
                      uapi("Fileman/trash", {"path": f"/{DDIR}/deploy.zip"})
                  else:
                      # Invoke the PHP extractor via HTTPS
                      php_url = f"https://kameir.com/{EXTRACTOR}"
                      print(f"Invoking {php_url} ...", flush=True)
                      extracted = False
                      for attempt in range(1, 4):
                          try:
                              pctx = ssl.create_default_context()
                              pctx.check_hostname = False
                              pctx.verify_mode = ssl.CERT_NONE
                              with urllib.request.urlopen(php_url, context=pctx, timeout=300) as r:
                                  body = r.read().decode().strip()
                              print(f"  PHP response: {body[:100]}", flush=True)
                              if body == 'OK':
                                  print("Extracted OK via PHP", flush=True)
                                  extracted = True
                                  break
                              else:
                                  print(f"  PHP attempt {attempt} returned: {body[:200]}", flush=True)
                          except Exception as e:
                              print(f"  PHP attempt {attempt} error: {e}", flush=True)
                          if attempt < 3:
                              time.sleep(5)
                      if not extracted:
                          failures += 1
                          # Clean up
                          uapi("Fileman/trash", {"path": f"/{DDIR}/deploy.zip"})
                          uapi("Fileman/trash", {"path": f"/{DDIR}/{EXTRACTOR}"})

          # Upload manifest last — only if deploy succeeded
          if not failures:
              mfp = dist / MKEY
              mfp.write_text(json.dumps(new_manifest, separators=(",", ":")))
              if upload_text(mfp, DDIR):
                  print("manifest.json OK", flush=True)
              else:
                  failures += 1

          if failures:
              print(f"\n{failures} step(s) failed.", flush=True)
              sys.exit(1)
          print(f"\nDone: {len(to_deploy)} files deployed via ZIP + PHP extract.", flush=True)
          PYEOF

      - name: Verify deployment
        run: |
          sleep 10
          echo "=== homepage ==="
          curl -sk --max-time 15 https://kameir.com/ | grep -o 'Christian Kameir' | head -1 || echo "MISSING"
          echo "=== manifest ==="
          curl -sk --max-time 15 https://kameir.com/manifest.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'OK: {len(d)} entries')" || echo "MISSING"
