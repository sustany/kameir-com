name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via cPanel API
        env:
          CPANEL_HOST: 15.204.206.156
          CPANEL_USER: greendat
          CPANEL_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          DEPLOY_DIR: public_html/kameir.com
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, urllib.parse, json, ssl, sys, mimetypes, uuid
          from pathlib import Path

          HOST  = os.environ['CPANEL_HOST']
          USER  = os.environ['CPANEL_USER']
          TOKEN = os.environ.get('CPANEL_TOKEN', '')
          DDIR  = os.environ['DEPLOY_DIR']

          if not TOKEN:
              print("ERROR: CPANEL_API_TOKEN secret is empty or not set", flush=True)
              sys.exit(1)

          print(f"Token length={len(TOKEN)}, host={HOST}, user={USER}", flush=True)

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          BASE    = f"https://{HOST}:2083/execute"
          AUTH    = f"cpanel {USER}:{TOKEN}"
          HEADERS = {"Authorization": AUTH, "Content-Type": "application/x-www-form-urlencoded"}

          def uapi(endpoint, params):
              data = urllib.parse.urlencode(params).encode()
              req  = urllib.request.Request(f"{BASE}/{endpoint}", data=data, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                      return json.load(r)
              except Exception as e:
                  return {"status": 0, "errors": [str(e)]}

          def ensure_dir(remote_dir):
              parts = remote_dir.split("/")
              for i in range(1, len(parts) + 1):
                  partial = "/".join(parts[:i])
                  if not partial:
                      continue
                  uapi("Fileman/mkdir", {"path": partial, "name": ""})

          def upload_binary(fp, rem_dir):
              boundary = uuid.uuid4().hex.encode()
              mime = mimetypes.guess_type(fp.name)[0] or "application/octet-stream"
              raw = fp.read_bytes()
              body = (
                  b"--" + boundary + b"\r\n"
                  b'Content-Disposition: form-data; name="dir"\r\n\r\n' +
                  rem_dir.encode() + b"\r\n"
                  b"--" + boundary + b"\r\n"
                  b'Content-Disposition: form-data; name="file-1"; filename="' +
                  fp.name.encode() + b'"\r\n'
                  b"Content-Type: " + mime.encode() + b"\r\n\r\n" +
                  raw + b"\r\n"
                  b"--" + boundary + b"--\r\n"
              )
              req = urllib.request.Request(
                  f"https://{HOST}:2083/execute/Fileman/upload_files",
                  data=body,
                  headers={
                      "Authorization": AUTH,
                      "Content-Type": f"multipart/form-data; boundary={boundary.decode()}",
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=60) as r:
                      return json.load(r)
              except Exception as e:
                  return {"status": 0, "errors": [str(e)]}

          dist      = Path("dist")
          all_files = [f for f in dist.rglob("*") if f.is_file()]
          print(f"Deploying {len(all_files)} files to {DDIR}", flush=True)

          dirs_seen = set()
          for fp in all_files:
              rel = fp.relative_to(dist)
              if str(rel.parent) != ".":
                  rem_dir = f"{DDIR}/{rel.parent}"
                  if rem_dir not in dirs_seen:
                      ensure_dir(rem_dir)
                      dirs_seen.add(rem_dir)

          failures = 0
          for fp in sorted(all_files):
              rel     = fp.relative_to(dist)
              rem_dir = f"{DDIR}/{rel.parent}" if str(rel.parent) != "." else DDIR
              raw = fp.read_bytes()
              try:
                  content      = raw.decode("utf-8")
                  from_charset = "UTF-8"
                  is_binary    = False
              except UnicodeDecodeError:
                  is_binary = True
              if is_binary:
                  res = upload_binary(fp, rem_dir)
                  if res.get("status") == 1:
                      print(f"  ok {rel} (binary)", flush=True)
                  else:
                      failures += 1
                      print(f"  FAIL {rel} (binary) => {res.get('errors', res)}", flush=True)
              else:
                  res = uapi("Fileman/save_file_content", {
                      "dir":          rem_dir,
                      "file":         fp.name,
                      "content":      content,
                      "from_charset": from_charset,
                      "to_charset":   "UTF-8",
                  })
                  if res.get("status") == 1:
                      print(f"  ok {rel}", flush=True)
                  else:
                      failures += 1
                      print(f"  FAIL {rel} => {res.get('errors', res)}", flush=True)

          if failures:
              print(f"\n{failures} file(s) failed.", flush=True)
              sys.exit(1)
          print(f"\nDeploy complete: {len(all_files)} files.", flush=True)
          PYEOF

      - name: Verify deployment
        run: |
          sleep 3
          echo "=== homepage check ==="
          curl -sk https://kameir.com/ | grep -o 'Christian Kameir' | head -1 || echo "MISSING"
          echo "=== ai-ethics check ==="
          curl -sk https://kameir.com/ai-ethics | grep -o 'Ethics Safe AI Use' | head -1 || echo "MISSING"
